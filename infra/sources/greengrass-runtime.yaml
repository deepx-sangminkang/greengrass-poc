AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  DX Runtime AWS IoT Greengrass infrastructure. Provisions the AWS IoT thing
  group, the Greengrass core-device token exchange role, and an idempotent
  publisher for the com.deepx.dx-runtime component, then creates a Greengrass
  deployment that installs the DEEPX NPU runtime (driver, firmware, dx_rt, and
  the dx_stream GStreamer runtime) on the core devices in the thing group.

Parameters:
  ProjectName:
    Type: String
    Default: dx-greengrass
    Description: Logical project name surfaced through stack outputs.
  ThingGroupName:
    Type: String
    Default: ""
    Description: >-
      AWS IoT thing group that Greengrass core devices join. Leave empty to
      derive a stack-unique name (<stack-name>-cores) so multiple stacks can
      coexist in the same account.
  DxRuntimeComponentVersion:
    Type: String
    Default: "2.4.0"
    Description: Existing published version of the com.deepx.dx-runtime component to deploy.
  DxRuntimeArtifactBaseUrl:
    Type: String
    Default: "https://deepx-public-bucket.s3.ap-northeast-2.amazonaws.com/dx-runtime/v2.4.0"
    Description: >-
      Public S3 base URL for the DX-Runtime install artifacts the component
      downloads at deploy time. The vX.Y.Z prefix is an immutable bundle matching
      the component version: dxrt-driver-dkms_2.5.1-2_all.deb (NPU driver),
      libdxrt-bin_3.4.0_{amd64,arm64}.deb (dx_rt prebuilt Debian package),
      fw.bin (2.7.2), and dx_stream.tar.gz (dx_stream staging v3.1.0).

Conditions:
  HasThingGroupName: !Not [!Equals [!Ref ThingGroupName, ""]]

Resources:
  GreengrassThingGroup:
    Type: AWS::IoT::ThingGroup
    Properties:
      ThingGroupName: !If
        - HasThingGroupName
        - !Ref ThingGroupName
        - !Sub "${AWS::StackName}-cores"

  GreengrassTokenExchangeRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Token exchange role for DX Greengrass core devices
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: credentials.iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GreengrassTokenExchangePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: GreengrassLogging
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/greengrass/*"
                  - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/greengrass/*:*"

  ComponentPublishFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Execution role for the idempotent Greengrass component publisher Lambda.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ComponentPublishPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ComponentPublishLogging
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Sid: ComponentPublish
                Effect: Allow
                Action:
                  - greengrass:CreateComponentVersion
                  - greengrass:DescribeComponent
                  - greengrass:ListComponentVersions
                  - greengrass:DeleteComponent
                Resource:
                  - !Sub "arn:${AWS::Partition}:greengrass:${AWS::Region}:${AWS::AccountId}:components:com.deepx.dx-runtime"
                  - !Sub "arn:${AWS::Partition}:greengrass:${AWS::Region}:${AWS::AccountId}:components:com.deepx.dx-runtime:versions:*"

  ComponentPublishFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: >-
        Idempotently publishes a Greengrass private component version from an inline
        recipe. Skips creation when the requested version already exists.
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt ComponentPublishFunctionRole.Arn
      Code:
        ZipFile: |
          import json
          import time
          import urllib.request

          import boto3
          from botocore.exceptions import ClientError

          ggv2 = boto3.client("greengrassv2")

          DEPLOYABLE_TIMEOUT = 180
          POLL_INTERVAL = 3


          def _send(event, context, status, data=None, physical_id=None):
              body = json.dumps({
                  "Status": status,
                  "Reason": "See CloudWatch Logs: %s" % context.log_stream_name,
                  "PhysicalResourceId": physical_id or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode("utf-8")
              request = urllib.request.Request(
                  event["ResponseURL"],
                  data=body,
                  method="PUT",
                  headers={"content-type": "", "content-length": str(len(body))},
              )
              urllib.request.urlopen(request)


          def _render(recipe, subs):
              for key, value in subs.items():
                  recipe = recipe.replace("{{ %s }}" % key, str(value))
              return recipe


          def _component_arn(props, name):
              return "arn:%s:greengrass:%s:%s:components:%s" % (
                  props.get("Partition", "aws"),
                  props["Region"],
                  props["AccountId"],
                  name,
              )


          def _version_exists(component_arn, version):
              try:
                  paginator = ggv2.get_paginator("list_component_versions")
                  for page in paginator.paginate(arn=component_arn):
                      for item in page.get("componentVersions", []):
                          if item.get("componentVersion") == version:
                              return True
              except ClientError as error:
                  if error.response["Error"]["Code"] == "ResourceNotFoundException":
                      return False
                  raise
              return False


          def _wait_deployable(version_arn):
              deadline = time.time() + DEPLOYABLE_TIMEOUT
              while time.time() < deadline:
                  status = ggv2.describe_component(arn=version_arn)["status"]
                  state = status.get("componentState")
                  if state == "DEPLOYABLE":
                      return
                  if state == "FAILED":
                      raise RuntimeError("Component publish failed: %s" % status.get("message"))
                  time.sleep(POLL_INTERVAL)
              raise TimeoutError("Component %s did not become DEPLOYABLE in time" % version_arn)


          def handler(event, context):
              props = event.get("ResourceProperties", {})
              name = props.get("ComponentName", "unknown")
              version = props.get("ComponentVersion", "unknown")
              base_id = "%s:%s" % (name, version)
              try:
                  request_type = event["RequestType"]

                  if request_type == "Delete":
                      pid = event.get("PhysicalResourceId", base_id)
                      # Only delete the version THIS stack created (":owned"). A stack that
                      # skipped a pre-existing version (":shared") must not delete it, or it
                      # would break a sibling stack that owns it. Component versions are
                      # account+region global, so ownership can't be inferred from existence.
                      if pid.endswith(":owned"):
                          version_arn = "%s:versions:%s" % (_component_arn(props, name), version)
                          try:
                              ggv2.delete_component(arn=version_arn)
                              print("[publish] deleted %s" % version_arn)
                          except ClientError as error:
                              # Best-effort: never block stack deletion on component cleanup.
                              print("[publish] delete skipped for %s: %s" % (version_arn, error))
                      _send(event, context, "SUCCESS", physical_id=pid)
                      return

                  if request_type == "Update":
                      # Preserve the create-time ownership marker when the version is
                      # unchanged. Re-deriving owned/shared here would flip the
                      # PhysicalResourceId and make CloudFormation delete the live version.
                      pid = event.get("PhysicalResourceId", base_id)
                      old_version = pid.rsplit(":", 2)[1] if pid.count(":") >= 2 else None
                      if old_version == version:
                          _send(event, context, "SUCCESS",
                                {"Action": "Unchanged", "ComponentVersion": version}, pid)
                          return
                      # Version bumped: fall through and publish the new version. CloudFormation
                      # then calls Delete on the old PhysicalResourceId (old ":owned" version).

                  component_arn = _component_arn(props, name)
                  if _version_exists(component_arn, version):
                      print("[publish] %s:%s already exists, skipping" % (name, version))
                      _send(event, context, "SUCCESS",
                            {"Action": "Skipped", "ComponentVersion": version,
                             "Arn": "%s:versions:%s" % (component_arn, version)},
                            "%s:shared" % base_id)
                      return

                  recipe = _render(props["Recipe"], props.get("Substitutions", {}))
                  response = ggv2.create_component_version(inlineRecipe=recipe.encode("utf-8"))
                  version_arn = response["arn"]
                  print("[publish] created %s, waiting for DEPLOYABLE" % version_arn)
                  _wait_deployable(version_arn)
                  _send(event, context, "SUCCESS",
                        {"Action": "Published", "ComponentVersion": version, "Arn": version_arn},
                        "%s:owned" % base_id)
              except Exception as error:  # noqa: BLE001
                  print("[publish] error: %s" % error)
                  _send(event, context, "FAILED", {"Message": str(error)}, base_id)

  DxRuntimeComponent:
    Type: Custom::ComponentPublish
    Properties:
      ServiceToken: !GetAtt ComponentPublishFunction.Arn
      ComponentName: "com.deepx.dx-runtime"
      ComponentVersion: !Ref DxRuntimeComponentVersion
      Partition: !Ref "AWS::Partition"
      Region: !Ref "AWS::Region"
      AccountId: !Ref "AWS::AccountId"
      Substitutions:
        version: !Ref DxRuntimeComponentVersion
        artifact_base_url: !Ref DxRuntimeArtifactBaseUrl
      Recipe: |
        RecipeFormatVersion: "2020-01-25"
        ComponentName: "com.deepx.dx-runtime"
        ComponentVersion: "{{ version }}"
        ComponentType: "aws.greengrass.generic"
        ComponentDescription: "DEEPX NPU runtime installation component (driver, firmware, dx_rt, dx_stream runtime)"
        ComponentPublisher: "DEEPX"
        Manifests:
          - Platform:
              os: "linux"
              # Match both classic and lite nucleus runtimes. Without this key,
              # Greengrass Nucleus Lite finds no matching manifest and the
              # deployment fails immediately on lite core devices.
              runtime: "*"
            Lifecycle:
              # Casing matters on Greengrass Nucleus Lite (case-sensitive
              # parser, per its recipe2unit source): step names must be
              # lowercase (install/run), while step attributes must be
              # CamelCase (Script/Timeout/RequiresPrivilege). The classic
              # nucleus is case-insensitive, so this works on both.
              install:
                # Lite runs components as a non-root user; root is required for
                # apt-get, DKMS, and firmware flashing (classic runs the script
                # as root via the default posixUser, so this is a no-op there).
                RequiresPrivilege: true
                # 2h: dx_stream's installer falls back to compiling OpenCV+GStreamer from
                # source when apt has no >=4.2 candidate (likely on Ubuntu 26.04),
                # which alone can take 30-90 min on a low-core aarch64 edge device.
                Timeout: 7200
                # NOTE: no shell brace syntax (curly ${VAR}, function bodies)
                # anywhere in this script: Nucleus Lite's recipe-runner treats
                # every "{" as the start of a recipe variable ({kernel:rootPath})
                # and aborts the install phase on anything else.
                Script: |
                  echo "Starting DX-Runtime S3-artifact installation..."

                  # Environment required for dxrt-cli / gst-inspect-1.0 (dxstream) to resolve
                  # their binaries, libraries, and GStreamer plugins during version detection and
                  # firmware flashing.
                  export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH"

                  # Resolve the multiarch triplet so plugin/library paths work on both x86_64 and
                  # aarch64 (Raspberry Pi) hosts instead of being hardcoded to x86_64-linux-gnu.
                  GST_ARCH_TRIPLET="$(gcc -dumpmachine 2>/dev/null || true)"
                  if [ -z "$GST_ARCH_TRIPLET" ]; then
                    case "$(uname -m)" in
                      x86_64) GST_ARCH_TRIPLET="x86_64-linux-gnu" ;;
                      aarch64|arm64) GST_ARCH_TRIPLET="aarch64-linux-gnu" ;;
                      armv7l|armv6l) GST_ARCH_TRIPLET="arm-linux-gnueabihf" ;;
                      *) GST_ARCH_TRIPLET="$(uname -m)-linux-gnu" ;;
                    esac
                  fi
                  GST_PLUGIN_DIR="/usr/local/lib/$GST_ARCH_TRIPLET/gstreamer-1.0"

                  export GST_PLUGIN_PATH="$GST_PLUGIN_DIR:$GST_PLUGIN_PATH"
                  export LD_LIBRARY_PATH="$GST_PLUGIN_DIR:/usr/local/share/gstdxstream/lib:$LD_LIBRARY_PATH"
                  export PATH="/usr/local/share/gstdxstream/bin:/usr/local/bin:$PATH"

                  # Public S3 base URL + artifact keys. Downloads use unauthenticated HTTPS, so no
                  # S3 IAM grant on the token-exchange role is required (the bucket is public).
                  ARTIFACT_BASE_URL="{{ artifact_base_url }}"
                  DRIVER_DEB="dxrt-driver-dkms_2.5.1-2_all.deb"
                  DXRT_DEB_VERSION="3.4.0"
                  FW_BIN="fw.bin"
                  DXSTREAM_TARBALL="dx_stream.tar.gz"
                  DXRT_CLI="/usr/local/bin/dxrt-cli"

                  # Every deployment reinstalls all four targets unconditionally (no
                  # version/presence skip checks): --reinstall forces apt to reinstall
                  # same-version .debs instead of reporting "already newest".
                  # Fail hard so a broken install marks the component BROKEN rather
                  # than silently continuing.
                  set -e

                  sudo apt-get update
                  sudo apt-get install -y curl tar ca-certificates

                  WORK_DIR="$(mktemp -d)"
                  cd "$WORK_DIR"

                  fetch() ( curl -fSL --retry 3 -o "$2" "$1" )

                  # Build/flash order: dx_rt_npu_linux_driver -> dx_rt -> dx_fw -> dx_stream

                  # 1) NPU Linux driver (DKMS .deb). DKMS builds the module against the running
                  # kernel, so pull kernel headers + dkms first (best-effort: the .deb install
                  # surfaces the real error if headers for this exact kernel are unavailable).
                  echo "Installing NPU driver from $ARTIFACT_BASE_URL/$DRIVER_DEB"
                  fetch "$ARTIFACT_BASE_URL/$DRIVER_DEB" "$DRIVER_DEB"
                  sudo apt-get install -y dkms "linux-headers-$(uname -r)" || true
                  sudo apt-get install -y --reinstall "./$DRIVER_DEB"

                  # 2) dx_rt (staging release/3.4.0, prebuilt Debian binary package libdxrt-bin).
                  # Arch-specific prebuilt package: dpkg's arch name matches the .deb suffix
                  # exactly on Debian/Ubuntu (amd64 / arm64). apt-get resolves Depends and
                  # runs the postinst (ldconfig + dx_engine wheel into the system python3).
                  DXRT_DEB="libdxrt-bin_$DXRT_DEB_VERSION""_$(dpkg --print-architecture).deb"
                  echo "Installing dx_rt Debian package from $ARTIFACT_BASE_URL/$DXRT_DEB"
                  fetch "$ARTIFACT_BASE_URL/$DXRT_DEB" "$DXRT_DEB"
                  sudo apt-get install -y --reinstall "./$DXRT_DEB"
                  cd "$WORK_DIR"

                  # 3) dx_fw (requires dx_rt: flashed via dxrt-cli).
                  echo "Flashing firmware from $ARTIFACT_BASE_URL/$FW_BIN"
                  fetch "$ARTIFACT_BASE_URL/$FW_BIN" "$FW_BIN"
                  sudo "$DXRT_CLI" -u "$FW_BIN"

                  # 4) dx_stream (staging branch, prebuilt tarball). NOTE: dx_stream install.sh
                  # installs every dependency by default and has NO --all flag -- it hard-errors
                  # (exit 1) on unknown arguments -- so it must be invoked with no arguments.
                  echo "Installing dx_stream from $ARTIFACT_BASE_URL/$DXSTREAM_TARBALL"
                  fetch "$ARTIFACT_BASE_URL/$DXSTREAM_TARBALL" "$DXSTREAM_TARBALL"
                  rm -rf dx_stream
                  tar xzf "$DXSTREAM_TARBALL"
                  cd dx_stream
                  ./install.sh
                  ./build.sh
                  cd "$WORK_DIR"
              run: "echo \"All DX-Runtime targets have been installed successfully.\""
            Artifacts: []
        Lifecycle: {}

  GreengrassDeployment:
    Type: AWS::GreengrassV2::Deployment
    DependsOn:
      - DxRuntimeComponent
    Properties:
      DeploymentName: !Sub "${AWS::StackName} DX Runtime Deployment"
      TargetArn: !GetAtt GreengrassThingGroup.Arn
      Components:
        com.deepx.dx-runtime:
          ComponentVersion: !Ref DxRuntimeComponentVersion

Outputs:
  ProjectName:
    Description: Logical project name.
    Value: !Ref ProjectName
  ThingGroupName:
    Description: AWS IoT thing group for Greengrass core devices.
    Value: !Ref GreengrassThingGroup
  TokenExchangeRoleName:
    Description: Token exchange role name passed to the Greengrass installer.
    Value: !Ref GreengrassTokenExchangeRole
  GreengrassDeploymentId:
    Description: Greengrass deployment that targets the core device thing group.
    Value: !GetAtt GreengrassDeployment.DeploymentId
